<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.2</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center text-primary mb-4">
            Button Groups and Toggle Buttons
        </h2>

        <div class="card shadow p-4">

            <!-- Button Group -->
            <h4 class="mb-3">Button Group</h4>

            <div class="btn-group mb-4">

                <button type="button" class="btn btn-primary">
                    Home
                </button>

                <button type="button" class="btn btn-success">
                    About
                </button>

                <button type="button" class="btn btn-warning">
                    Contact
                </button>

            </div>

            <hr>

            <!-- Toggle Buttons -->
            <h4 class="mb-3">Toggle Buttons</h4>

            <input type="checkbox" class="btn-check" id="html">

            <label class="btn btn-outline-primary me-2" for="html">
                HTML
            </label>

            <input type="checkbox" class="btn-check" id="css">

            <label class="btn btn-outline-success me-2" for="css">
                CSS
            </label>

            <input type="checkbox" class="btn-check" id="bootstrap">

            <label class="btn btn-outline-danger" for="bootstrap">
                Bootstrap
            </label>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
