<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.2</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body class="bg-light">

    <div class="container py-5">

        <h2 class="text-center mb-5 text-primary">
            Pricing Plans
        </h2>

        <div class="row">

            <!-- Basic Plan -->
            <div class="col-md-4 mb-4">
                <div class="card text-center shadow p-4 h-100">

                    <h3>Basic</h3>

                    <h4 class="text-success my-3">
                        ₹499
                    </h4>

                    <p>Access to basic features</p>

                    <button class="btn btn-outline-primary mt-3">
                        Choose Plan
                    </button>

                </div>
            </div>

            <!-- Standard Plan -->
            <div class="col-md-4 mb-4">
                <div class="card text-center shadow p-4 h-100">

                    <h3>Standard</h3>

                    <h4 class="text-success my-3">
                        ₹999
                    </h4>

                    <p>Access to all standard features</p>

                    <button class="btn btn-primary mt-3">
                        Choose Plan
                    </button>

                </div>
            </div>

            <!-- Premium Plan -->
            <div class="col-md-4 mb-4">
                <div class="card text-center shadow p-4 h-100">

                    <h3>Premium</h3>

                    <h4 class="text-success my-3">
                        ₹1499
                    </h4>

                    <p>Access to premium tools and support</p>

                    <button class="btn btn-dark mt-3">
                        Choose Plan
                    </button>

                </div>
            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
